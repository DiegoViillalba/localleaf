name: Build & Release

on:
  push:
    tags:
      - "v*"          # Se activa con git tag v0.1.0 && git push --tags
  workflow_dispatch:  # También se puede lanzar manualmente desde GitHub

jobs:
  # ─────────────────────────────────────────────────────────────────
  # macOS — Apple Silicon (aarch64)
  # ─────────────────────────────────────────────────────────────────
  build-macos-arm:
    name: macOS · Apple Silicon
    runs-on: macos-latest   # macos-latest = runner arm64 desde 2024

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-arm-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-arm-cargo-

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Para firmar en producción (opcional — sin esto el .dmg funciona pero muestra advertencia):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LocalLeaf ${{ github.ref_name }}
          releaseBody: "Ver CHANGELOG para detalles."
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin

  # ─────────────────────────────────────────────────────────────────
  # macOS — Intel (x86_64)
  # ─────────────────────────────────────────────────────────────────
  build-macos-intel:
    name: macOS · Intel
    runs-on: macos-13   # macos-13 = último runner x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-intel-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-intel-cargo-

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LocalLeaf ${{ github.ref_name }}
          releaseBody: "Ver CHANGELOG para detalles."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-apple-darwin

  # ─────────────────────────────────────────────────────────────────
  # Windows — x86_64
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows · x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LocalLeaf ${{ github.ref_name }}
          releaseBody: "Ver CHANGELOG para detalles."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
