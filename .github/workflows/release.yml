name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS — Apple Silicon   (crea el GitHub Release cuando es un tag)
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos-arm:
    name: macOS · Apple Silicon
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-arm-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-arm-cargo-v2-

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build & Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('LocalLeaf {0}', github.ref_name) || '' }}
          releaseBody: "Consulta el historial de commits para ver los cambios incluidos en esta versión."
          releaseDraft: ${{ github.ref_type == 'tag' }}
          prerelease: true
          args: --target aarch64-apple-darwin

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows — x86_64   (.exe NSIS + .msi)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows · x86_64
    runs-on: windows-latest
    needs: build-macos-arm

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-v2-

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build & Upload to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseDraft: ${{ github.ref_type == 'tag' }}
          prerelease: true
          args: --target x86_64-pc-windows-msvc

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux — x86_64   (.AppImage + .deb)
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux · x86_64
    runs-on: ubuntu-22.04
    needs: build-macos-arm

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: linux-cargo-v2-

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build & Upload to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseDraft: ${{ github.ref_type == 'tag' }}
          prerelease: true
          args: --target x86_64-unknown-linux-gnu
