name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # macOS — Apple Silicon (CREA el release)
  # ─────────────────────────────────────────────
  build-macos:
    name: macOS · Apple Silicon
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-cargo-v2-

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build & Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LocalLeaf ${{ github.ref_name }}
          releaseBody: "Ver CHANGELOG para detalles."
          releaseDraft: false
          prerelease: true
          args: --target aarch64-apple-darwin

  # ─────────────────────────────────────────────
  # Windows — x86_64 (SOLO agrega assets)
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows · x86_64
    runs-on: windows-latest
    needs: build-macos   #  espera a que el release exista

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-v2-

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build & Upload to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: true
          args: --target x86_64-pc-windows-msvc